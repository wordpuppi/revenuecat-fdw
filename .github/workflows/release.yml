name: Build and Release WASM FDW

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install cargo-component
        run: cargo install cargo-component --locked --version 0.21.1

      - name: Build WASM binary
        run: cargo component build --release --target wasm32-unknown-unknown

      - name: Generate checksum
        run: |
          cd target/wasm32-unknown-unknown/release
          sha256sum revenuecat_fdw.wasm > revenuecat_fdw.wasm.sha256
          echo "SHA256 checksum:"
          cat revenuecat_fdw.wasm.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/wasm32-unknown-unknown/release/revenuecat_fdw.wasm
            target/wasm32-unknown-unknown/release/revenuecat_fdw.wasm.sha256
